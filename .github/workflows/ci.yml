name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        experimental: [false]
        include:
          # Runner image may not exist yet / toolchain may be too new; do not
          # block the workflow on it.
          - os: ubuntu-26.04
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          # The 22.04 runner image ships libunwind-14-dev, which conflicts
          # with libgstreamer1.0-dev's libunwind-dev dependency.
          sudo apt-get remove -y 'libunwind-*-dev' || true
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libgl1-mesa-dev libglu1-mesa-dev libglfw3-dev libglm-dev libcairo2-dev \
            libfontconfig1-dev \
            libeigen3-dev libspdlog-dev libfmt-dev libyaml-cpp-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstrtspserver-1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DXMCAM_BUILD_GUI=ON -DXMCAM_BUILD_TESTS=ON -DXMCAM_WERROR=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Package (deb)
        run: |
          cd build && cpack -G DEB
          dpkg-deb --info xmappcamera_*_amd64.deb
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmappcamera-deb-${{ matrix.os }}
          path: build/xmappcamera_*_amd64.deb
          retention-days: 14

      - name: Verify OpenCV is not linked into the app
        run: |
          if ldd build/bin/xmAppCamera 2>/dev/null | grep -i opencv; then
            echo "ERROR: OpenCV linked into xmAppCamera"; exit 1
          fi
          echo "OK: no OpenCV in xmAppCamera"
